name: Notion Project Sync

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - master
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode'
        required: true
        default: 'manual_snapshot'
        type: choice
        options:
          - manual_snapshot
          - project_summary

jobs:
  notion-sync:
    name: Sync GitHub events to Notion project tracker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Skip when Notion secrets are missing
        if: ${{ secrets.NOTION_TOKEN == '' }}
        run: echo "NOTION_TOKEN is not configured. Skipping Notion sync."

      - name: Sync event to Notion
        if: ${{ secrets.NOTION_TOKEN != '' }}
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TASKS_DATABASE_ID: ${{ secrets.NOTION_TASKS_DATABASE_ID }}
          NOTION_DEVLOG_DATABASE_ID: ${{ secrets.NOTION_DEVLOG_DATABASE_ID }}
          NOTION_PATCH_NOTES_DATABASE_ID: ${{ secrets.NOTION_PATCH_NOTES_DATABASE_ID }}
          NOTION_PROJECTS_DATABASE_ID: ${{ secrets.NOTION_PROJECTS_DATABASE_ID }}
          NOTION_SYNC_MODE: ${{ github.event.inputs.mode || 'event' }}
        run: node scripts/notion-sync.mjs
